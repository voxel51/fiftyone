name: Test e2e

on:
  workflow_call:
    secrets:
      docker-username:
        required: false
      docker-password:
        required: false
jobs:
  prepare-e2e:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    name: Prepare e2e assets
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/ms-playwright
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          sparse-checkout: |
            /*
            !/docs/**
          sparse-checkout-cone-mode: false

      - name: Setup node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable

      - name: Prepare yarn 4
        run: corepack prepare yarn@4.9.1 --activate

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          large-packages: false

      - name: Compute app tree hash
        id: app-tree-hash
        run: echo "hash=$(git rev-parse HEAD:app)" >> $GITHUB_OUTPUT

      - name: Cache built app static assets
        id: app-static-cache
        uses: actions/cache@v5
        with:
          path: fiftyone/server/static
          key: app-static-${{ runner.os }}-${{ steps.app-tree-hash.outputs.hash }}
        background: true

      - name: Cache app Node Modules
        id: app-node-cache
        uses: actions/cache@v5
        with:
          path: |
            app/node_modules
            app/.yarn/cache
          key: node-modules-${{ hashFiles('app/yarn.lock') }}
        background: true

      - name: Cache E2E Node Modules
        id: e2e-node-cache
        uses: actions/cache@v5
        with:
          path: |
            e2e-pw/node_modules
          key: node-modules-${{ hashFiles('e2e-pw/yarn.lock') }}
        background: true

      - name: Wait for dependency caches
        wait: [app-static-cache, app-node-cache, e2e-node-cache]

      - name: Install app
        if: steps.app-static-cache.outputs.cache-hit != 'true' && steps.app-node-cache.outputs.cache-hit != 'true'
        run: yarn install
        working-directory: app

      - name: Build app
        id: build-app
        if: steps.app-static-cache.outputs.cache-hit != 'true'
        run: make app
        background: true

      - name: Install E2E dependencies if not cached
        run: yarn install
        if: steps.e2e-node-cache.outputs.cache-hit != 'true'
        working-directory: e2e-pw

      - name: Get Playwright version
        id: playwright-version
        run: |
          echo "PLAYWRIGHT_VERSION=$(node -e "process.stdout.write(require('@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT
        working-directory: e2e-pw

      - name: Cache playwright browser
        uses: actions/cache@v5
        id: playwright-browser-cache
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}

      - name: Install Playwright Chromium if not cached
        run: yarn playwright install chromium
        if: steps.playwright-browser-cache.outputs.cache-hit != 'true'
        working-directory: e2e-pw

      - name: Wait for app build
        if: steps.app-static-cache.outputs.cache-hit != 'true'
        wait: build-app

      - name: Bundle built app static assets
        run: tar -czf e2e-app-static.tgz fiftyone/server/static

      - name: Upload built app static assets
        uses: actions/upload-artifact@v7
        with:
          name: e2e-app-static
          path: e2e-app-static.tgz
          retention-days: 1

  test-e2e:
    needs: prepare-e2e
    timeout-minutes: 90
    runs-on: ubuntu-latest # the standard runner's 14GB free disk space is not sufficient.  We create more free space with the `jlumbroso/free-disk-space` action as a step (below).
    name: Test e2e (Mongo ${{ matrix.mongodb-version }}, shard ${{ matrix.shard }}/6)
    env:
      FIFTYONE_DO_NOT_TRACK: true
      FIFTYONE_APP_DEFAULT_QUERY_PERFORMANCE: false
      FIFTYONE_DATABASE_URI: mongodb://localhost:27017
      FIFTYONE_DATABASE_NAME: playwright
      ELECTRON_EXTRA_LAUNCH_ARGS: "--disable-gpu"
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/ms-playwright
      FIFTYONE_PLUGINS_DIR: ${{ github.workspace }}/e2e-pw/src/shared/assets/plugins
      VFF_EXP_ANNOTATION: true
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        mongodb-version:
          - "latest"
        shard: [1, 2, 3, 4, 5, 6]
    services:
      # Run MongoDB as a service container rather than via a Docker-based
      # action. Container actions are built from `docker:latest` at job start
      # (before any step runs), so the previous `supercharge/mongodb-github-action`
      # added an extra, unauthenticated Docker Hub pull that intermittently timed
      # out. The runner's docker daemon pulls `mongo` directly here, with native
      # health checks and retries.
      mongo:
        image: mongo:${{ matrix.mongodb-version }}
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          sparse-checkout: |
            /*
            !/docs/**
          sparse-checkout-cone-mode: false

      - name: Setup node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable

      - name: Prepare yarn 4
        run: corepack prepare yarn@4.9.1 --activate

      - name: Download built app static assets
        uses: actions/download-artifact@v8
        with:
          name: e2e-app-static

      - name: Restore built app static assets
        run: tar -xzf e2e-app-static.tgz -C .

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        # Skip docker login on forks (that won't have the docker-* secrets)
        if: env.docker-username != '' && env.docker-password != ''
        env:
          docker-username: ${{ secrets.docker-username }}
          docker-password: ${{ secrets.docker-password }}
        with:
          username: ${{ env.docker-username }}
          password: ${{ env.docker-password }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.10.16

      - name: Setup (UV)
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.10.16
          enable-cache: true
          cache-dependency-path: |
            requirements/common.txt
            requirements/github.txt
            requirements/test.txt
            requirements/e2e.txt
      - name: Free Disk Space (Ubuntu) # standard runner's 14 GB available disk size isn't enough. Need at least 22 GB free.
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          large-packages: false # e2e test failed when `true`
      - name: Install Python dependencies
        id: install-python-dependencies
        run: |
          uv pip install --system -r requirements/e2e.txt
          uv pip install --system '.[multimodal]' -r requirements/e2e.txt
        background: true

      - name: Setup FFmpeg
        id: setup-ffmpeg
        uses: ./.github/actions/setup-ffmpeg
        background: true

      - name: Cache E2E Node Modules
        id: e2e-node-cache
        uses: actions/cache@v5
        with:
          path: |
            e2e-pw/node_modules
          key: node-modules-${{ hashFiles('e2e-pw/yarn.lock') }}

      - name: Install E2E dependencies if not cached
        run: yarn install
        if: steps.e2e-node-cache.outputs.cache-hit != 'true'
        working-directory: e2e-pw

      - name: Get Playwright version
        id: playwright-version
        run: |
          echo "PLAYWRIGHT_VERSION=$(node -e "process.stdout.write(require('@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT
        working-directory: e2e-pw

      - name: Cache playwright browser
        uses: actions/cache@v5
        id: playwright-browser-cache
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}

      - name: Install Playwright Chromium if not cached
        run: yarn playwright install chromium
        if: steps.playwright-browser-cache.outputs.cache-hit != 'true'
        working-directory: e2e-pw

      - name: Wait for Python dependencies
        wait: install-python-dependencies

      - name: Configure
        id: test_config
        run: |
          python tests/utils/setup_config.py
          python tests/utils/github_actions_flags.py

      - name: Wait for FFmpeg
        wait: setup-ffmpeg

      - name: Run Playwright tests
        run: yarn e2e --shard=${{ matrix.shard }}/6
        working-directory: e2e-pw

      - name: Lint Playwright tests
        run: yarn lint
        working-directory: e2e-pw

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-mongodb-${{ matrix.mongodb-version }}-shard-${{ matrix.shard }}
          path: e2e-pw/playwright-report/
          retention-days: 30
