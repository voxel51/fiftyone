name: Community base policy

# Non-members may only contribute via the `community` branch. When an author
# without write access opens a PR against develop/release, this moves the PR's
# base to `community` automatically and leaves a one-time explanatory comment.
# Members, and PRs already targeting `community`, are left alone.
#
# Uses pull_request_target so it can edit the base of fork PRs. It only reads PR
# metadata and calls the API — it never checks out PR head code.

on:
  pull_request_target:
    types: [opened, reopened, edited]

concurrency:
  group: community-base-policy-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  pull-requests: write
  issues: write

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            if (pr.base.ref === 'community') return;

            // Members (write/maintain/admin) may target develop/release directly.
            let hasPush = false;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: author,
              });
              hasPush = ['write', 'admin', 'maintain'].includes(data.permission);
            } catch {
              hasPush = false;
            }
            if (hasPush) return;

            // Non-member: move the PR onto the community branch.
            const from = pr.base.ref;
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              base: 'community',
            });

            const marker = '<!-- community-base-policy -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            if (!comments.some(c => (c.body || '').includes(marker))) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  marker,
                  `👋 Thanks for the contribution! Community pull requests target the \`community\` branch, so I've changed this PR's base from \`${from}\` to \`community\`.`,
                  '',
                  'Your changes are unaffected. A maintainer integrates `community` into `develop` automatically.',
                  '',
                  'See [CONTRIBUTING.md](https://github.com/voxel51/fiftyone/blob/develop/CONTRIBUTING.md#community-pull-requests) for details.',
                ].join('\n'),
              });
            }
