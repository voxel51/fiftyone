name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened, closed, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  modified-files:
    runs-on: ubuntu-latest
    outputs:
      app-changes: ${{ steps.filter.outputs.app }}
      e2e-changes: ${{ steps.filter.outputs.e2e-pw }}
      fiftyone-changes: ${{ steps.filter.outputs.fiftyone }}
      format-changes: ${{ steps.filter.outputs.format }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            /*
            !/docs/**
          sparse-checkout-cone-mode: false
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'app/**'
              - '.github/workflows/build.yml'
            e2e-pw:
              - 'e2e-pw/**'
              - '.github/workflows/e2e.yml'
            fiftyone:
              - 'fiftyone/**'
              - 'package/**'
              - 'requirements/**'
              - 'tests/**'
              - 'requirements.txt'
              - 'setup.py'
              - '.github/workflows/build.yml'
              - '.github/workflows/test.yml'
              - 'plugins/**'
            format:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.json'
              - '**/*.css'
              - '**/*.scss'
              - '**/*.md'

  build:
    needs: modified-files
    if: >-
      github.event.action != 'closed' && (
      needs.modified-files.outputs.app-changes == 'true' ||
      needs.modified-files.outputs.fiftyone-changes == 'true')
    uses: ./.github/workflows/build.yml

  e2e:
    needs: modified-files
    if: >-
      github.event.action != 'closed' && (
      needs.modified-files.outputs.app-changes == 'true' ||
      needs.modified-files.outputs.e2e-changes == 'true' ||
      needs.modified-files.outputs.fiftyone-changes == 'true')
    uses: ./.github/workflows/e2e.yml
    secrets:
      docker-username: ${{ secrets.RO_DOCKERHUB_USERNAME }}
      docker-password: ${{ secrets.RO_DOCKERHUB_PAT }}

  lint:
    needs: modified-files
    if: >-
      github.event.action != 'closed' && (
      needs.modified-files.outputs.app-changes == 'true' ||
      needs.modified-files.outputs.fiftyone-changes == 'true' ||
      needs.modified-files.outputs.format-changes == 'true')
    uses: ./.github/workflows/lint-app.yml

  test:
    needs: modified-files
    if: >-
      github.event.action != 'closed' && (
      needs.modified-files.outputs.app-changes == 'true' ||
      needs.modified-files.outputs.fiftyone-changes == 'true')
    uses: ./.github/workflows/test.yml
    with:
      python-versions: >-
        ${{ (github.base_ref == 'develop' ||
        startsWith(github.base_ref, 'feat/'))
        && '["3.10", "3.12"]' || '["3.10", "3.11", "3.12"]' }}

  test-windows:
    needs: modified-files
    if: >-
      github.event.action != 'closed' &&
      needs.modified-files.outputs.fiftyone-changes == 'true'
    uses: ./.github/workflows/windows-test.yml
    with:
      python-versions: >-
        ${{ (github.base_ref == 'develop' ||
        startsWith(github.base_ref, 'feat/'))
        && '["3.10", "3.12"]' || '["3.10", "3.11", "3.12"]' }}

  all-tests:
    runs-on: ubuntu-latest
    needs: [build, lint, test, e2e]
    if: always()
    steps:
      - run: sh -c ${{
          (needs.build.result == 'success' || needs.build.result == 'skipped') &&
          (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
          (needs.test.result == 'success' || needs.test.result == 'skipped') &&
          (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') }}
