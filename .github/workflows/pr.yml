name: Pull Request

on:
  pull_request:
    # `edited` catches base changes — notably GitHub auto-retargeting a stacked
    # PR to develop when the PR below it merges — so the heavy suite runs before
    # it can land (no `synchronize` fires on an auto-retarget).
    types: [opened, synchronize, reopened, closed, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Only cancel an in-progress run when the new run will actually run CI.
  # A PR title/body edit fires an `edited` event (no base change) that skips
  # every heavy job; letting it cancel the running suite would leave the PR
  # falsely green, since `all-tests` treats skipped jobs as a pass.
  cancel-in-progress: ${{ github.event.action != 'edited' || github.event.changes.base != null }}

permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  modified-files:
    runs-on: ubuntu-latest
    outputs:
      app-changes: ${{ steps.filter.outputs.app }}
      e2e-changes: ${{ steps.filter.outputs.e2e-pw }}
      fiftyone-changes: ${{ steps.filter.outputs.fiftyone }}
      format-changes: ${{ steps.filter.outputs.format }}
      run-ci: ${{ steps.gate.outputs.run-ci }}
      heavy: ${{ steps.gate.outputs.heavy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            /*
            !/docs/**
          sparse-checkout-cone-mode: false
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'app/**'
              - '.github/workflows/build.yml'
            e2e-pw:
              - 'e2e-pw/**'
              - '.github/workflows/e2e.yml'
            fiftyone:
              - 'fiftyone/**'
              - 'package/**'
              - 'requirements/**'
              - 'tests/**'
              - 'requirements.txt'
              - 'setup.py'
              - '.github/workflows/build.yml'
              - '.github/workflows/test.yml'
              - 'plugins/**'
            format:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.json'
              - '**/*.css'
              - '**/*.scss'
              - '**/*.md'

      - name: Gate CI by base branch
        id: gate
        env:
          BASE_REF: ${{ github.base_ref }}
          ACTION: ${{ github.event.action }}
          BASE_CHANGED: ${{ github.event.changes.base != null }}
        shell: bash
        run: |
          # `edited` fires on title/body edits too; only (re)run when the base
          # changed (e.g. a stacked PR auto-retargeted to develop after the one
          # below merged).
          run_ci=true
          if [ "$ACTION" = "edited" ] && [ "$BASE_CHANGED" != "true" ]; then
            run_ci=false
          fi
          # Heavy jobs (build/test/e2e/windows) only for PRs targeting a
          # long-lived branch. Intra-stack PRs (base = another feature branch)
          # skip them and are tested when promoted to develop/release.
          heavy=false
          if [ "$run_ci" = "true" ]; then
            case "$BASE_REF" in
              develop|main|release/*) heavy=true ;;
            esac
          fi
          echo "run-ci=$run_ci" >> "$GITHUB_OUTPUT"
          echo "heavy=$heavy" >> "$GITHUB_OUTPUT"

  build:
    needs: modified-files
    if: >-
      github.event.action != 'closed' &&
      needs.modified-files.outputs.heavy == 'true' && (
      needs.modified-files.outputs.app-changes == 'true' ||
      needs.modified-files.outputs.fiftyone-changes == 'true')
    uses: ./.github/workflows/build.yml

  e2e:
    needs: modified-files
    if: >-
      github.event.action != 'closed' &&
      needs.modified-files.outputs.heavy == 'true' && (
      needs.modified-files.outputs.app-changes == 'true' ||
      needs.modified-files.outputs.e2e-changes == 'true' ||
      needs.modified-files.outputs.fiftyone-changes == 'true')
    uses: ./.github/workflows/e2e.yml
    secrets:
      docker-username: ${{ secrets.RO_DOCKERHUB_USERNAME }}
      docker-password: ${{ secrets.RO_DOCKERHUB_PAT }}

  lint:
    needs: modified-files
    if: >-
      github.event.action != 'closed' &&
      needs.modified-files.outputs.run-ci == 'true' && (
      needs.modified-files.outputs.app-changes == 'true' ||
      needs.modified-files.outputs.fiftyone-changes == 'true' ||
      needs.modified-files.outputs.format-changes == 'true')
    uses: ./.github/workflows/lint-app.yml

  test:
    needs: modified-files
    if: >-
      github.event.action != 'closed' &&
      needs.modified-files.outputs.heavy == 'true' && (
      needs.modified-files.outputs.app-changes == 'true' ||
      needs.modified-files.outputs.fiftyone-changes == 'true')
    uses: ./.github/workflows/test.yml
    with:
      python-versions: >-
        ${{ (github.base_ref == 'develop' ||
        startsWith(github.base_ref, 'feat/'))
        && '["3.10", "3.12"]' || '["3.10", "3.11", "3.12"]' }}

  test-windows:
    needs: modified-files
    if: >-
      github.event.action != 'closed' &&
      needs.modified-files.outputs.heavy == 'true' &&
      needs.modified-files.outputs.fiftyone-changes == 'true'
    uses: ./.github/workflows/windows-test.yml
    with:
      python-versions: >-
        ${{ (github.base_ref == 'develop' ||
        startsWith(github.base_ref, 'feat/'))
        && '["3.10", "3.12"]' || '["3.10", "3.11", "3.12"]' }}

  all-tests:
    runs-on: ubuntu-latest
    needs: [modified-files, build, lint, test, e2e]
    if: always()
    env:
      # A run that skipped the suite (no-op body edit, `closed`, or a failed
      # gate) must not aggregate its skipped needs into a vacuous green that
      # becomes the latest `all-tests` for a SHA whose real suite failed.
      NO_OP: >-
        ${{ needs.modified-files.result == 'success' &&
        (needs.modified-files.outputs.run-ci != 'true' ||
        github.event.action == 'closed') }}
    steps:
      - name: Fail when the CI gate did not complete
        if: needs.modified-files.result != 'success'
        run: exit 1
      - name: Mirror the last real all-tests result
        if: env.NO_OP == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const { data } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              check_name: 'all-tests',
              per_page: 100,
            });
            const prior = data.check_runs
              .filter((c) => c.status === 'completed')
              .sort((a, b) => new Date(b.started_at) - new Date(a.started_at))[0];
            if (!prior) {
              core.setFailed('No completed all-tests for this commit yet — deferring to the run testing it.');
            } else if (prior.conclusion === 'success') {
              core.info('Mirroring the previous all-tests result: success');
            } else {
              core.setFailed(`Mirroring the previous all-tests result: ${prior.conclusion}`);
            }
      - name: Aggregate suite results
        if: env.NO_OP != 'true'
        run: sh -c ${{
          (needs.build.result == 'success' || needs.build.result == 'skipped') &&
          (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
          (needs.test.result == 'success' || needs.test.result == 'skipped') &&
          (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') }}
