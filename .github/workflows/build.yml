name: Build

on: workflow_call

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            changes:
              - 'app/**'
              - '.github/**'
              - 'fiftyone/**'
              - 'setup.py'

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone fiftyone
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Set up Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: 3.9
      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel build

      - name: Setup node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable
      - name: Prepare yarn 4
        run: corepack prepare yarn@4.9.1 --activate

      - name: Compute app tree hash
        id: app-tree-hash
        run: echo "hash=$(git rev-parse HEAD:app)" >> $GITHUB_OUTPUT

      - name: Cache built app static assets
        id: app-static-cache
        uses: actions/cache@v5
        with:
          path: fiftyone/server/static
          key: app-static-${{ runner.os }}-${{ steps.app-tree-hash.outputs.hash }}

      - name: Cache Node Modules
        id: node-cache
        uses: actions/cache@v5
        with:
          path: |
            app/node_modules
            app/.yarn/cache
          key: node-modules-${{ hashFiles('app/yarn.lock') }}
      - name: Install app
        if: steps.app-static-cache.outputs.cache-hit != 'true' && steps.node-cache.outputs.cache-hit != 'true'
        run: cd app && yarn install
      - name: Build app
        if: steps.app-static-cache.outputs.cache-hit != 'true'
        run: make app
      - name: Set environment
        env:
          RELEASE_TAG: ${{ github.ref }}
        run: |
          if [[ $RELEASE_TAG =~ ^refs\/tags\/v[0-9]+.[0-9]+.[0-9]+rc[0-9]+ ]]; then
             echo "RELEASE_VERSION=$(echo "${{ github.ref }}" | sed "s/^refs\/tags\/v//")" >> $GITHUB_ENV
          fi
      - name: Build python
        run: make python -o app
      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
