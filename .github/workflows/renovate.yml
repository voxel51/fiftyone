name: Renovate

# Self-hosted so PRs are authored by voxel51-bot, a collaborator with push:
# community-prs.yml then leaves their base alone instead of retargeting to
# `community`, which is what looped against Dependabot's default-branch PRs.

on:
  schedule:
    - cron: "0 14 * * 3"
  workflow_dispatch:
    inputs:
      logLevel:
        description: Renovate log level
        default: info
        type: string

concurrency:
  group: renovate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  renovate:
    # RENOVATE_REPOSITORIES below scopes each run to whichever repo it's
    # executing in — the OSS repo or its synced Enterprise copy.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Authenticate to Google Artifact Registry
        id: gar
        if: github.repository == 'voxel51/fiftyone-teams'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GOOGLE_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          token_format: access_token
      - uses: renovatebot/github-action@v46.1.15
        with:
          token: ${{ secrets.FIFTYONE_GITHUB_TOKEN }}
          # Each repo keeps its own config: OSS uses renovate.json; the Enterprise
          # copy uses renovate-foe.json (the synced renovate.json is inert there).
          configurationFile: ${{ github.repository == 'voxel51/fiftyone-teams' && 'renovate-foe.json' || 'renovate.json' }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          # Auth for the private Artifact Registry index (empty/no-op in OSS).
          # The token rides in RENOVATE_SECRETS, which Renovate redacts from
          # its logs, rather than inline in the host rule.
          RENOVATE_SECRETS: >-
            {"GAR_TOKEN":"${{ steps.gar.outputs.access_token }}"}
          RENOVATE_HOST_RULES: >-
            [{"matchHost":"us-central1-python.pkg.dev","hostType":"pypi","username":"oauth2accesstoken","password":"{{ secrets.GAR_TOKEN }}"}]
