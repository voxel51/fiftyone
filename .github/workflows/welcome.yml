name: Welcome

on:
  pull_request_target:
    types: [opened]

permissions:
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.author_association != 'MEMBER' &&
      github.event.pull_request.author_association != 'OWNER' && 
      github.event.pull_request.author_association != 'COLLABORATOR'
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                `Thanks for opening this pull request, @${context.payload.pull_request.user.login}! 🎉`,
                '',
                'A maintainer will review your changes as soon as they can. In the meantime, please make certain:',
                '',
                '- [ ] You have filled out the PR template above, completely to the best of your knowledge',
                '- [ ] Your changes include tests (if applicable)',
                '- [ ] You have read the [contribution guide](https://github.com/voxel51/fiftyone/blob/develop/CONTRIBUTING.md)',
                '',
                '**Helpful resources:**',
                '- 📖 [FiftyOne Documentation](https://docs.voxel51.com/)',
                '- 💬 [Discord Community](https://discord.gg/fiftyone-community)',
                '- 🎬 [YouTube Channel](https://www.youtube.com/@voxel51)',
              ].join('\n'),
            });
