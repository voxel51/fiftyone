name: Welcome

on:
  pull_request_target:
    types: [opened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to test with (dry run)"
        required: true
        type: number

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.author_association != 'MEMBER' &&
      github.event.pull_request.author_association != 'OWNER' &&
      github.event.pull_request.author_association != 'COLLABORATOR')
    steps:
      - name: Comment on PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.FIFTYONE_GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request
              || (await github.rest.pulls.get({
                   owner: context.repo.owner,
                   repo: context.repo.repo,
                   pull_number: context.payload.inputs.pr_number,
                 })).data;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                `Thanks for opening this pull request, @${pr.user.login}! 🎉`,
                '',
                'A maintainer will review your changes soon. In the meantime, please ensure:',
                '',
                '- [ ] You filled out the PR template above, completely to the best of your knowledge',
                '- [ ] You include tests (if applicable)',
                '- [ ] You read the [contribution guide](https://github.com/voxel51/fiftyone/blob/develop/CONTRIBUTING.md)',
                '',
                '**Helpful resources:**',
                '- 📖 [FiftyOne Documentation](https://docs.voxel51.com/)',
                '- 💬 [Discord Community](https://discord.gg/fiftyone-community)',
                '- 🎬 [YouTube Channel](https://www.youtube.com/@voxel51)',
              ].join('\n'),
            });
