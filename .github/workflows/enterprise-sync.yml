name: Enterprise Sync

on:
  pull_request:
    # `edited` catches base changes (no `synchronize` fires on a retarget). No
    # `branches:` filter: it matches the current base, so a retarget away from
    # develop/release would be dropped before we can close the mirror.
    types: [opened, synchronize, reopened, closed, ready_for_review, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Don't cancel the `closed` run: merging a PR auto-deletes its head branch,
  # which tears down refs/pull/<n>/merge and cancels the in-flight run before it
  # can dispatch the "OSS merged" signal to fiftyone-teams. Only cancel the
  # superseded in-PR runs (opened/synchronize/etc.).
  cancel-in-progress: ${{ github.event.action != 'closed' }}

jobs:
  enterprise-sync:
    # Only the OSS repo dispatches; the synced Enterprise copy is inert here.
    # Run for synced-base PRs or any base change (changes.base, `edited` only).
    if: >-
      github.repository == 'voxel51/fiftyone' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !endsWith(github.event.pull_request.user.login, '[bot]') &&
      (github.event.action != 'edited' || github.event.changes.base) &&
      (
        github.event.pull_request.base.ref == 'develop' ||
        startsWith(github.event.pull_request.base.ref, 'release/') ||
        github.event.changes.base
      ) &&
      (
        github.event.action == 'closed' ||
        github.event.pull_request.draft != true
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.FIFTYONE_GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const action = context.payload.action;
            const sha = pr.head.sha;
            const base = pr.base.ref;

            // Bases mirrored into Enterprise.
            const isSyncBase = (b) => b === 'develop' || b.startsWith('release/');

            // Retarget away from a synced base: close the orphaned mirror.
            if (action === 'edited' && context.payload.changes.base) {
              const from = context.payload.changes.base.ref.from;
              if (isSyncBase(from) && !isSyncBase(base)) {
                await github.rest.repos.createCommitStatus({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  sha,
                  state: 'success',
                  context: 'enterprise / ci',
                  description: 'No Enterprise sync — PR no longer targets develop/release',
                });
                await github.rest.repos.createDispatchEvent({
                  owner: 'voxel51',
                  repo: 'fiftyone-teams',
                  event_type: 'oss-pr-sync',
                  client_payload: {
                    action: 'closed',
                    branch: pr.head.ref,
                    author: pr.user.login,
                    pr_number: pr.number,
                    commit_sha: sha,
                    base: from,
                    merged: false,
                  },
                });
                return;
              }
            }

            // A base we don't mirror, and not a retarget away from one.
            if (!isSyncBase(base)) {
              return;
            }

            // Show `enterprise / ci` pending until the sync workflow overwrites
            // it. Skip for closed PRs — the OSS PR is past the gate.
            if (action !== 'closed') {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state: 'pending',
                context: 'enterprise / ci',
                description: 'Awaiting Enterprise sync workflow…',
              });
            }

            await github.rest.repos.createDispatchEvent({
              owner: 'voxel51',
              repo: 'fiftyone-teams',
              event_type: 'oss-pr-sync',
              client_payload: {
                action,
                branch: pr.head.ref,
                author: pr.user.login,
                pr_number: pr.number,
                commit_sha: sha,
                base,
                merged: pr.merged ?? false,
              }
            });
