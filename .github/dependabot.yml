---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # ---------------------------------------------------------------------------
  # FiftyOne Python Dependabot configuration
  # Notes:
  #   1. Prefer to constrain libraries at the major version
  #   2. Document where constraints aren't possible with comments
  #   3. Constrain ML-related libraries at upper bound
  # For more, see `setup.py`.
  # ---------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "14:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    # Widen the allowed version requirements to include both the new and old versions, when possible.
    # Typically, this only increases the maximum allowed version requirement.
    versioning-strategy: "auto"
    ignore:
      # Ignore anything mongo related
      - dependency-name: "pymongo"
      - dependency-name: "motor"
      - dependency-name: "mongoengine"
      # handle internal packages by ourselves
      - dependency-name: "fiftyone-brain"
      - dependency-name: "fiftyone-db"
      - dependency-name: "voxel51-eta"
      # pin pydicom to <3 — pydicom 3 drops Python 3.9 and changes APIs we rely on
      - dependency-name: "pydicom"

    groups:
      stable-python-packages:
        patterns:
          - "*"
